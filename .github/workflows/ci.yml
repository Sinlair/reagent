name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            package/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install foundation package dependencies
        run: npm ci --prefix package

      - name: Typecheck foundation package
        run: npm --prefix package run typecheck

      - name: Build foundation package
        run: npm --prefix package run build

      - name: Typecheck
        run: npm run check:all

      - name: Test
        run: npm test
