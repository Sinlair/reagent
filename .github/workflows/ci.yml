name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            package/package-lock.json
            packages/reagent-core/package-lock.json
            packages/reagent-openclaw/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install reagent-core dependencies
        run: npm ci --prefix packages/reagent-core

      - name: Install reagent-openclaw dependencies
        run: npm ci --prefix packages/reagent-openclaw

      - name: Install package dependencies
        run: npm ci --prefix package

      - name: Typecheck
        run: npm run check:all

      - name: Test
        run: npm test
