name: Bug Report
description: Report a reproducible bug in the ReAgent workspace, runtime, or plugin path.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please include concrete reproduction details. For runtime or channel issues, include the relevant provider mode, lifecycle state, and logs when possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide a minimal sequence that reproduces the issue.
      placeholder: |
        1. Configure ...
        2. Start ...
        3. Open ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected Surface
      options:
        - Root web workspace
        - Root runtime / API
        - WeChat native channel
        - OpenClaw bridge
        - reagent-core package
        - reagent-openclaw package
        - package/ reference package
        - Documentation
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, provider mode, or other relevant environment details.
      placeholder: Windows 11, Node 22, Chrome 136, WECHAT_PROVIDER=openclaw
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Paste only the relevant excerpt. Do not paste secrets.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that helps narrow it down.
